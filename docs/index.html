<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PJM Load Forecast</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { color-scheme: light; }
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 980px; margin: 2rem auto; padding: 0 1rem; background: #fff; color: #111; }
  header { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  h1 { margin: 0 0 .25rem; }
  .sub { color: #666; margin-bottom: 1.25rem; }
  .links a { margin-left: 1rem; color: inherit; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0 1.5rem; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: .75rem 1rem; }
  .card h3 { margin: 0 0 .25rem; font-size: 1rem; }
  .card dl { display: grid; grid-template-columns: auto 1fr; gap: .15rem .75rem; margin: 0; }
  .card dt { color: #666; }
  .card dd { margin: 0; font-variant-numeric: tabular-nums; }
  canvas { width: 100% !important; height: 420px !important; }
  .notes { margin-top: 1.75rem; max-width: 70ch; }
  .notes h2 { font-size: 1.05rem; margin: 1.5rem 0 .5rem; }
  .notes h2:first-child { margin-top: 0; }
  .notes p { margin: 0 0 .75rem; }
  .notes ul.legend { list-style: none; padding: 0; margin: 0 0 .75rem; }
  .notes ul.legend li { margin: .15rem 0; }
  .notes .dot { display: inline-block; width: 14px; height: 2px; vertical-align: middle; margin-right: .25rem; }
  .notes .dot.black { background: #111; height: 2px; }
  .notes .dot.blue { background: #1a73e8; }
  .notes .dot.red { background: #d93025; }
  .notes dl.glossary { display: grid; grid-template-columns: max-content 1fr; gap: .35rem 1rem; margin: 0 0 .25rem; }
  .notes dl.glossary dt { font-weight: 600; }
  .notes dl.glossary dd { margin: 0; }
  footer { color: #888; font-size: .85rem; margin-top: 1.5rem; }
  .loading { color: #888; padding: 2rem 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useState, useRef } = React;

const fmt = (x, d = 0) => x.toLocaleString(undefined, { maximumFractionDigits: d, minimumFractionDigits: d });

function MetricCard({ title, m }) {
  return (
    <div className="card">
      <h3>{title}</h3>
      <dl>
        <dt>MAE</dt><dd>{fmt(m.mae, 0)} MW</dd>
        <dt>RMSE</dt><dd>{fmt(m.rmse, 0)} MW</dd>
        <dt>MAPE</dt><dd>{fmt(m.mape * 100, 2)}%</dd>
      </dl>
    </div>
  );
}

function ForecastChart({ data }) {
  const ref = useRef(null);
  useEffect(() => {
    const chart = new Chart(ref.current, {
      type: 'line',
      data: {
        labels: data.timestamps,
        datasets: [
          { label: 'Actual', data: data.actual, borderColor: '#111', borderWidth: 1.5, pointRadius: 0 },
          { label: 'Gradient boosting', data: data.gbm, borderColor: '#1a73e8', borderWidth: 1.25, pointRadius: 0 },
          { label: 'Seasonal naive', data: data.seasonal_naive, borderColor: '#d93025', borderWidth: 1, pointRadius: 0, borderDash: [4, 3] },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: { ticks: { maxTicksLimit: 8, callback: function (v) { return this.getLabelForValue(v).slice(0, 10); } } },
          y: { title: { display: true, text: 'MW' } },
        },
        plugins: { legend: { position: 'bottom' } },
      },
    });
    return () => chart.destroy();
  }, [data]);
  return <canvas ref={ref} />;
}

function App() {
  const [data, setData] = useState(null);
  useEffect(() => { fetch('data.json').then(r => r.json()).then(setData); }, []);

  return (
    <>
      <header>
        <div>
          <h1>PJM hourly load forecast</h1>
          <p className="sub">Predicting hourly electricity demand on the U.S. mid-Atlantic power grid.</p>
        </div>
        <nav className="links">
          <a href="https://github.com/stephenchien3/pjm-load-forecast" target="_blank" rel="noopener">GitHub</a>
          <a href="https://stephenchien3.github.io/pjm-load-forecast/" target="_blank" rel="noopener">Pages</a>
        </nav>
      </header>

      {data ? (
        <>
          <div className="metrics">
            <MetricCard title="Seasonal naive" m={data.metrics.seasonal_naive} />
            <MetricCard title="Gradient boosting" m={data.metrics.gbm} />
          </div>
          <ForecastChart data={data} />
          <section className="notes">
            <h2>The 30-second version</h2>
            <p>
              Every hour, the U.S. power grid has to generate almost exactly as much
              electricity as people are using — you can't easily store it.
              Grid operators forecast demand in advance so they know how many power plants
              to turn on. This page shows two ways of doing that forecast and how they compare.
            </p>

            <h2>Glossary</h2>
            <dl className="glossary">
              <dt>PJM</dt>
              <dd>
                The grid operator for 13 states from New Jersey to Illinois — about 65 million
                people. They publish hourly demand data going back to 2002.
              </dd>
              <dt>Load</dt>
              <dd>Total electricity being used at one moment, summed across every house, business, and factory on the grid.</dd>
              <dt>MW (megawatt)</dt>
              <dd>
                A unit of electric power. 1 MW ≈ enough to power ~750 average U.S. homes
                at once. PJM East peaks around 60,000 MW on a hot summer afternoon.
              </dd>
              <dt>Hour-ahead forecast</dt>
              <dd>"Given everything we know up to now, how much electricity will the grid use next hour?"</dd>
            </dl>

            <h2>The chart</h2>
            <p>
              This is the last 30 days of the dataset (mid-2018), which neither model was
              allowed to see during training — so it's a fair test.
            </p>
            <ul className="legend">
              <li><span className="dot black" /> <strong>Actual</strong> — what really happened</li>
              <li><span className="dot blue" /> <strong>Gradient boosting</strong> — the smarter model's guess</li>
              <li><span className="dot red" /> <strong>Seasonal naive</strong> — a dumb baseline: "just predict whatever happened this same hour, exactly one week ago"</li>
            </ul>
            <p>
              The two daily bumps are the morning and evening demand peak (people waking up,
              then coming home and turning on lights / AC). The wider valleys are weekends,
              when factories and offices are quiet.
            </p>

            <h2>Why one model wins</h2>
            <p>
              The seasonal-naive baseline is right whenever this week looks like last week.
              It falls apart during heat waves, holidays, or any week that <em>doesn't</em>
              look like last week — that's most of them. It ends up about{' '}
              {fmt(data.metrics.seasonal_naive.mape * 100, 1)}% off on a typical hour.
            </p>
            <p>
              The gradient-boosting model is a forest of small decision trees that learns from
              the calendar (hour of day, day of week, month, weekend or not) plus what the load
              actually was 1 hour ago, 24 hours ago, and a week ago. Because it can <em>combine</em>
              those signals — "it's 6 PM on a hot August Tuesday and load was already high an
              hour ago" — it lands within about{' '}
              {fmt(data.metrics.gbm.mape * 100, 1)}% of the truth, roughly{' '}
              {fmt(data.metrics.seasonal_naive.mape / data.metrics.gbm.mape, 0)}× more accurate.
            </p>

            <h2>Reading the error numbers</h2>
            <dl className="glossary">
              <dt>MAE</dt>
              <dd>Mean Absolute Error: on a typical hour, how many MW were we off by? Lower is better.</dd>
              <dt>RMSE</dt>
              <dd>Root Mean Squared Error: like MAE but punishes big misses more than small ones. Useful because being 5,000 MW short for one hour is much worse than being 500 MW short for ten hours.</dd>
              <dt>MAPE</dt>
              <dd>Mean Absolute Percentage Error: the typical miss expressed as a % of actual demand. Easiest to compare across grids of different sizes.</dd>
            </dl>
          </section>
        </>
      ) : <p className="loading">Loading forecast…</p>}

      <footer>
        Source: PJME hourly load (PJM Interconnection).
        Models: <code>SeasonalNaive</code> (week-ago value) and <code>HistGradientBoostingRegressor</code> on calendar + lag features.
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
